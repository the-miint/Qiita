action_id: fastq-to-parquet
version: 1.0.0
target_kind: prep_sample
# Sequenced-only by definition: FASTQ files are sequencing artifacts.
# The submit route reads the prep_sample's processing_kind and 422s if
# it's not in this list. Cross-kind admin actions leave the list empty.
target_processing_kinds: [sequenced]

description: >
  Convert a single sample's FASTQ (or FASTA) file into a Parquet of
  reads, keyed by a CP-minted sequence_idx. The orchestrator counts
  the reads (or read pairs), POSTs to /api/v1/sequence-range (PR #36's
  allocator) for a contiguous bigint range against this prep_sample,
  and writes the final Parquet with sequence_idx as the first column.

  Paired-end: when action_context carries `reverse_fastq_path`, miint
  reads R1 + R2 in lockstep and emits one row per PAIR — the pair
  shares a single sequence_idx (paired reads correspond to one
  molecular event). Unpaired: sequence2/quality2 are NULL.

  Schema: (sequence_idx, read_id, sequence1, qual1, sequence2,
  qual2), sorted by sequence_idx — miint's native column names, no
  aliasing. No `sequence_length`: Parquet row-group metadata covers
  file-level estimates and `length(sequence1)` is trivial per row.
  Workspace-only artifact (no DuckLake registration yet); registration
  adds the rest of the CLAUDE.md identifier-column hierarchy when
  sample_reads lands data-plane-side.

  Per-sample scope (target_kind: prep_sample, scoped at the supertype)
  — one ticket per sample, one Parquet artifact under the work_ticket's
  workspace. The "processing_kind = sequenced" constraint is expressed
  declaratively via target_processing_kinds below; the route's
  submit-time check rejects tickets pointing at non-sequenced preps.

  The orchestrator authenticates to the CP using the compute
  service-account PAT (Settings.co_to_cp_token, provisioned per
  docs/runbooks/compute-service-account-provisioning.md); the
  submitter does NOT need sequence_range:mint scope on their own
  token.

scopes: []

audience:
  # End users can submit fastq-to-parquet for prep_samples whose every
  # non-retired linked study they have ADMIN access to. The work_ticket
  # POST route applies the per-study tier gate; wet_lab_admin and
  # system_admin bypass it (same bypass as the biosample / sequenced-
  # sample write surfaces).
  service: false
  human_roles: [user, wet_lab_admin, system_admin]

context_schema:
  type: object
  required: [fastq_path]
  properties:
    # Absolute path on the shared filesystem the orchestrator can
    # read. minLength rejects an empty string; the "^/" pattern
    # rejects relative paths, which would silently resolve against
    # whatever CWD the launcher happens to start in — a SLURM-side
    # surprise we'd rather catch at submission time.
    fastq_path:
      type: string
      minLength: 1
      pattern: "^/"
    # Optional R2 file for paired-end input. Same absolute-path
    # constraint. When supplied, miint reads both files in lockstep
    # via `read_fastx(?, sequence2:=?)` and emits one row per pair
    # (mate-id parity asserted at parse time by SequenceReader::
    # read_pe), so the pair shares one sequence_idx.
    reverse_fastq_path:
      type: string
      minLength: 1
      pattern: "^/"

steps:
  - step: fastq
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.fastq_to_parquet
    inputs: [fastq_path]
    # `reverse_fastq_path` flows through only when the action_context
    # carries it; tickets for single-end samples omit it.
    optional_inputs: [reverse_fastq_path]
    outputs: [reads]
    baseline_resources:
      cpu: 2
      # 8 GB covers long-read inputs (~2.4 GB resident per thread:
      # 2048 STANDARD_VECTOR_SIZE × 60 row_group_size × ~20 KB avg
      # long-read record) with headroom. DuckDB's own memory_limit
      # is set to mem_gb - 1 in the job module so Python + miint
      # runtime keep ~1 GB of process headroom outside DuckDB.
      mem_gb: 8
      walltime: PT30M

action_ceiling:
  cpu: 8
  mem_gb: 16
  walltime: PT2H
