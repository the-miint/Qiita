action_id: host-reference-add
version: 1.0.0
target_kind: reference

description: >
  Like reference-add, but for a HOST reference used for host-read depletion:
  hash + mint + load the sequences (taxonomy required), then build the
  host-filter indexes — a rype `.ryxdi` minimizer index over every feature and a
  minimap2 `.mmi` — and record them in qiita.reference_index. At
  host-read-filtering time the host_filter step (fastq-to-parquet/1.1.0)
  classifies reads against the rype index (host = any match; a POSITIVE index,
  not rype's negative_index) and re-checks the survivors with minimap2; reads
  flagged by either are removed. Differs from reference-add only by requiring
  taxonomy and by the build-index → register-index tail; the lifecycle gains
  `loading → indexing → active`.

  Index selection is per-submission: by default BOTH indexes are built, but
  `build_rype: false` / `build_minimap2: false` in action_context skip a
  builder (and its register-index) so a reference can carry rype-only or
  minimap2-only. At least one must be built (the `not` backstop below rejects
  both-false). Build params are tunable: `rype_w` sets the rype window `w`
  (default 20) and `minimap2_preset` sets the minimap2 preset (default `sr`).
  Selection is an INITIAL-BUILD-TIME choice — the status FSM is terminal at
  `active`, so re-running this action to add a second index type to an
  already-active reference is not supported (delete and recreate instead).

scopes:
  - reference:write

audience:
  service: false
  human_roles: [wet_lab_admin, system_admin]

context_schema:
  type: object
  # Both required for a host reference: the FASTA is the sequence source and
  # taxonomy is the mapping authority. tree / jplace / genome_map stay optional
  # (same shape as reference-add). The runner resolves every `*_upload_idx`
  # key to a `*_path` binding before any step runs
  # (qiita_control_plane.runner._resolve_upload_handles).
  required: [fasta_upload_idx, taxonomy_upload_idx]
  properties:
    fasta_upload_idx: {type: integer, minimum: 1}
    taxonomy_upload_idx: {type: integer, minimum: 1}
    tree_upload_idx: {type: integer, minimum: 1}
    jplace_upload_idx: {type: integer, minimum: 1}
    genome_map_upload_idx: {type: integer, minimum: 1}
    # Index selection (default-ON via the steps' `when:`; omitting a key builds
    # that index). The runner reads these to gate build_rype_index /
    # build_minimap2_index and their register-index siblings.
    build_rype: {type: boolean}
    build_minimap2: {type: boolean}
    # Build params surfaced to the index builders via the steps' `params:`
    # (rype_w -> build_rype_index.w, minimap2_preset -> build_minimap2_index.preset).
    rype_w: {type: integer, minimum: 1}
    minimap2_preset:
      type: string
      enum: [sr, map-ont, map-pb, map-hifi, asm5, asm10, asm20]
  # A host reference must carry at least one index — reject building neither.
  # Fires only when BOTH keys are present and explicitly false (an omitted key
  # defaults ON via the `when:` gate, so the common path is unaffected).
  not:
    required: [build_rype, build_minimap2]
    properties:
      build_rype: {const: false}
      build_minimap2: {const: false}

success_status: active
failure_status: failed

steps:
  - step: hash_sequences
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.hash_sequences
    target_status: hashing
    inputs: [fasta_path]
    outputs: [manifest, reference_sequence_chunks]
    baseline_resources:
      cpu: 4
      mem_gb: 8
      walltime: PT1H

  - action: mint-features
    target_status: minting
    inputs: [manifest]
    outputs: [feature_map]

  - action: write-membership
    inputs: [feature_map]
    outputs: []

  - step: load
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.reference_load
    target_status: loading
    inputs: [manifest, feature_map, reference_sequence_chunks]
    optional_inputs: [taxonomy_path, tree_path, jplace_path]
    # `reference_sequence_chunks` is re-emitted feature-keyed here (the
    # hash_sequences binding was sequence_hash-keyed); build_rype_index below
    # consumes that re-keyed form.
    outputs: [staging_dir, reference_sequence_chunks]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT2H

  # MUST precede register-files: register-files MOVES the feature-keyed
  # reference_sequence_chunks part files into permanent DuckLake storage
  # (data-plane move_file), so the index build has to read them from staging
  # first. The persistent .ryxdi is written under the derived-artifact base
  # ({PATH_DERIVED}/references/{reference_idx}/rype/index.ryxdi), not the
  # ephemeral workspace — so it is NOT a step output (the launcher manifest +
  # verifier require every output to resolve under $QIITA_OUTPUT_PATH). The only
  # output is a small in-tree meta JSON (rype_index_meta) carrying index_type /
  # fs_path / params that register-index consumes; fs_path is where the .ryxdi
  # actually lives.
  - step: build_rype_index
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.build_rype_index
    target_status: indexing
    inputs: [reference_sequence_chunks]
    # `rype_w` (action_context) -> build_rype_index.Inputs.w (the rype window).
    params: {rype_w: w}
    # Skipped when action_context sets build_rype: false (rype-only references
    # omit it; minimap2-only references set it false). Its register-index
    # sibling carries the same gate.
    when: build_rype
    outputs: [rype_index_meta]
    # mem_gb 64 (not 32): a large host set (many human genomes) OOMed at 32.
    # An OOM retry doubles this to the 128 GB action_ceiling; the job hard-caps
    # DuckDB at 30 GB and hands the growing remainder to rype's `max_memory`.
    baseline_resources:
      cpu: 4
      mem_gb: 64
      walltime: PT2H

  # Sidecar minimap2 `.mmi` for the second-pass host filter, written to
  # {PATH_DERIVED}/references/{reference_idx}/minimap2/index.mmi. Consumes the
  # SAME feature-keyed `reference_sequence_chunks` as build_rype_index
  # (reassembling whole contigs via string_agg) — no special raw-FASTA side
  # channel — so it shares the register-files ordering dependency: it MUST also
  # precede register-files (which MOVES those chunks). Carries
  # `target_status: indexing` too (NOT only build_rype_index): build_rype_index
  # may be skipped (build_rype: false, a minimap2-only reference), so this step
  # must be able to make the `loading → indexing` transition itself. When both
  # build, the second PATCH is an idempotent no-op (runner only PATCHes when the
  # current status differs).
  - step: build_minimap2_index
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.build_minimap2_index
    target_status: indexing
    inputs: [reference_sequence_chunks]
    # `minimap2_preset` (action_context) -> build_minimap2_index.Inputs.preset.
    params: {minimap2_preset: preset}
    # Skipped when action_context sets build_minimap2: false (minimap2-only
    # references omit it; rype-only references set it false). Its register-index
    # sibling carries the same gate.
    when: build_minimap2
    # Same as build_rype_index: the persistent .mmi lives under PATH_DERIVED, so
    # the only output is the in-tree meta JSON (fs_path points at the .mmi).
    outputs: [minimap2_index_meta]
    baseline_resources:
      cpu: 4
      mem_gb: 32
      walltime: PT2H

  - action: register-files
    inputs: [staging_dir]
    outputs: []

  # One register-index per builder. The runner's register-index arm reads
  # bound[entry.inputs[0]] (native-step outputs are path strings, so the build
  # params ride a meta JSON file), so each step's `inputs` selects which index
  # it records in qiita.reference_index. Each carries the SAME `when:` as its
  # builder so a skipped index also skips its registration (and never reads a
  # never-produced *_index_meta binding).
  - action: register-index
    inputs: [rype_index_meta]
    when: build_rype
    outputs: []

  - action: register-index
    inputs: [minimap2_index_meta]
    when: build_minimap2
    outputs: []

action_ceiling:
  cpu: 16
  mem_gb: 128
  walltime: PT4H
