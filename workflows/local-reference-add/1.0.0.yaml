action_id: local-reference-add
version: 1.0.0
target_kind: reference

description: >
  Local-ingest variant of reference-add. Where reference-add streams a single
  FASTA over Arrow Flight DoPut, this stages MANY host-resident FASTA files
  (listed in a manifest of absolute paths) into one chunked Parquet, then runs
  the SAME hash → mint → membership → load → register pipeline unchanged.
  Companion inputs (taxonomy / tree / jplace / genome_map) are raw absolute
  paths on the compute host, not DoPut uploads.

scopes:
  - reference:write

audience:
  service: false
  human_roles: [wet_lab_admin, system_admin]

context_schema:
  type: object
  # Only the manifest is required. Every value is a raw absolute path on the
  # compute host (NOT a DoPut `*_upload_idx`), so each carries `pattern:"^/"`:
  # under SLURM only an absolute shared-FS path is visible from the compute
  # node (bind mounts expose host paths, they do not copy), and a CWD-relative
  # path would resolve against a surprise directory. The runner leaves these
  # `*_path` keys untouched (it only resolves `*_upload_idx` keys).
  required: [fasta_manifest_path]
  properties:
    # Absolute path to a text file listing one absolute FASTA path per line
    # (blank lines and `#` comments ignored). stage_local_fasta reads it,
    # parses every file with miint's read_fastx, and emits the combined chunked
    # fasta.parquet that hash_sequences consumes.
    fasta_manifest_path: {type: string, pattern: "^/"}
    # Optional companions, raw absolute paths. Same downstream wiring as
    # reference-add: taxonomy / tree / jplace flow into the load step's
    # optional_inputs; genome_map_path is pulled directly by the mint-features
    # action via bound.get("genome_map_path") — a YAML-only reader can't see
    # that from mint-features' inputs line, so it's noted here.
    taxonomy_path: {type: string, pattern: "^/"}
    tree_path: {type: string, pattern: "^/"}
    jplace_path: {type: string, pattern: "^/"}
    genome_map_path: {type: string, pattern: "^/"}
    # Analysis sharding (opt-in, default OFF) — identical semantics to
    # reference-add's shard_index: after register-files, `plan-shards` assigns
    # reference_membership.shard_id and fans out one build-shard-index ticket per
    # shard (loading → indexing → active). Sharding is an indexing choice on the
    # same reference data. Default OFF → today's loading → active, byte-identical.
    shard_index: {type: boolean}
    # Which per-shard analysis indexes to build (default-ON; only meaningful when
    # shard_index is true). Per-shard rype no longer exists — routing is the ONE
    # whole-reference rype_router the sharded path builds automatically, so a
    # shard builds only minimap2 + bowtie2.
    build_minimap2: {type: boolean}
    build_bowtie2: {type: boolean}
    # Build params forwarded to the shard builders (minimap2_preset ->
    # build_minimap2_index.preset).
    minimap2_preset:
      type: string
      enum: [sr, map-ont, map-pb, map-hifi, asm5, asm10, asm20]
  # A sharded reference must build at least one per-shard index type (same
  # backstop as reference-add). Fires only when shard_index is true AND both
  # build_* are explicitly false. The whole-reference rype_router is always built.
  not:
    required: [shard_index, build_minimap2, build_bowtie2]
    properties:
      shard_index: {const: true}
      build_minimap2: {const: false}
      build_bowtie2: {const: false}
    # Optional GFF3 of per-interval ANNOTATIONS on the sequences above (a plasmid map
    # naming each SynDNA insert's window; a genome's gene coordinates). Each interval
    # is minted its OWN feature_idx so it can key a feature table while reads align to
    # its parent. Contract + the closed->half-open coordinate conversion:
    # qiita_compute_orchestrator.jobs.hash_sequences.
    gff_path: {type: string, pattern: "^/"}

success_status: active
failure_status: failed

steps:
  # The only new step on the local path: manifest → one combined chunked
  # fasta.parquet. Its `fasta_path` output is wired into hash_sequences below,
  # which is byte-for-byte the reference-add hash_sequences step (the remote
  # path produces the same shape from a DoPut'd upload). No target_status: the
  # reference stays `pending` through staging, and hash_sequences makes the
  # first transition (pending → hashing) exactly as in reference-add. The
  # baseline_resources here duplicate the DuckDB caps in stage_local_fasta
  # (mem_gb=32, cpu=8); a mismatch is visible at review time.
  - step: stage_local_fasta
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.stage_local_fasta
    inputs: [fasta_manifest_path]
    outputs: [fasta_path]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT24H

  - step: hash_sequences
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.hash_sequences
    target_status: hashing
    inputs: [fasta_path]
    # Optional GFF3 of annotated intervals. Absent → a ZERO-ROW annotation_manifest
    # rather than an absent output; see the hash_sequences module docstring for why
    # that beats a `when:` gate (short version: `when:` is default-ON).
    optional_inputs: [gff_path]
    outputs: [manifest, reference_sequence_chunks, annotation_manifest]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT24H

  - action: mint-features
    target_status: minting
    inputs: [manifest]
    outputs: [feature_map]

  # Mint a feature_idx for each ANNOTATED INTERVAL, and record the reference's claim
  # on it in qiita.reference_annotation. Deliberately NOT followed by
  # write-membership — membership is what gets INDEXED, and an interval is
  # quantified, not aligned against. `manifest` + `feature_map` are the SEQUENCE
  # side's, read only to resolve each interval's parent_feature_idx.
  # See qiita_control_plane.actions.library.mint_annotation_features.
  - action: mint-annotation-features
    inputs: [annotation_manifest, feature_map]
    outputs: [annotation_map]

  - action: write-membership
    inputs: [feature_map]
    outputs: []

  - step: load
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.reference_load
    target_status: loading
    inputs: [manifest, feature_map, reference_sequence_chunks,
             annotation_manifest, annotation_map]
    optional_inputs: [taxonomy_path, tree_path, jplace_path]
    outputs: [staging_dir]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT24H

  - action: register-files
    inputs: [staging_dir]
    outputs: []

  # Sharded-index fan-out (opt-in) — identical to reference-add's plan-shards
  # tail. Runs only when shard_index: true; MUST follow register-files (shard
  # builds stream chunks from DuckLake). See reference-add/1.0.0.yaml for the
  # full rationale (loading → indexing → active, conditional finalize).
  - action: plan-shards
    when: shard_index
    inputs: []
    outputs: []

  # Whole-reference routing index — identical to reference-add's router tail (see
  # that file for the full rationale). Gated on `router_pending` (plan-shards sets
  # it true + stages `shard_mapping` only on a real fan-out, N > 0). Runs in the
  # PARENT ticket after plan-shards; build_routing_index builds the whole-reference
  # rype ROUTER, register-index records the `rype_router` row, and finalize-shard
  # converges with the per-shard children on the guarded indexing → active.
  - step: build_routing_index
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.build_routing_index
    when: router_pending
    inputs: [shard_mapping]
    outputs: [routing_index_meta]
    # Whole-reference rype build (sized like local-host-reference-add's
    # build_rype_index — the local path allows a long walltime for genome-scale
    # references); an OOM retry doubles mem to the 128 GB action ceiling.
    baseline_resources:
      cpu: 4
      mem_gb: 64
      walltime: PT24H

  - action: register-index
    when: router_pending
    inputs: [routing_index_meta]
    outputs: []

  - action: finalize-shard
    when: router_pending
    inputs: []
    outputs: []

action_ceiling:
  cpu: 16
  # 128 (not 64): build_routing_index starts at 64 GB and an OOM retry doubles it,
  # matching local-host-reference-add's build_rype_index ceiling rationale.
  mem_gb: 128
  walltime: PT48H
