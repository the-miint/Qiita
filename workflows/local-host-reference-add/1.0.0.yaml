action_id: local-host-reference-add
version: 1.0.0
target_kind: reference

description: >
  Local-ingest variant of host-reference-add. Stages MANY host-resident FASTA
  files (a manifest of absolute paths) into one chunked Parquet, then runs the
  host pipeline unchanged: hash + mint + load (taxonomy required), build the
  host-filter indexes (a rype `.ryxdi` and a minimap2 `.mmi`, both over every
  feature), and record them in
  qiita.reference_index. They are consumed at host-read-filtering time by the
  host_filter step: rype classify (host = any match), then minimap2 on the
  survivors; reads matching either are removed. Differs from local-reference-add
  only by requiring taxonomy and by the build-index → register-index tail; the
  lifecycle gains `loading → indexing → active`. Companions are raw absolute
  paths on the compute host, not DoPut uploads.

  Index selection is per-submission (same as host-reference-add): both indexes
  build by default; `build_rype: false` / `build_minimap2: false` in
  action_context skip a builder (and its register-index) for a rype-only or
  minimap2-only reference, and the `not` backstop rejects building neither.
  `rype_w` tunes the rype window `w` (default 20) and `minimap2_preset` the
  minimap2 preset (default `sr`). Selection is INITIAL-BUILD-TIME only — the
  status FSM is terminal at `active`, so adding a second index type to an
  already-active reference is not supported (delete and recreate instead).

scopes:
  - reference:write

audience:
  service: false
  human_roles: [wet_lab_admin, system_admin]

context_schema:
  type: object
  # Both required for a host reference: the FASTA manifest is the sequence
  # source and taxonomy is the rype mapping authority. Every value is a raw
  # absolute path on the compute host (NOT a DoPut `*_upload_idx`); `pattern:"^/"`
  # forces absolute so the SLURM compute node can see it (bind mounts expose
  # host paths, they do not copy). The runner leaves `*_path` keys untouched.
  required: [fasta_manifest_path, taxonomy_path]
  properties:
    fasta_manifest_path: {type: string, pattern: "^/"}
    taxonomy_path: {type: string, pattern: "^/"}
    tree_path: {type: string, pattern: "^/"}
    jplace_path: {type: string, pattern: "^/"}
    genome_map_path: {type: string, pattern: "^/"}
    # Optional GFF3 of per-interval ANNOTATIONS on the sequences above (a plasmid map
    # naming each SynDNA insert's window; a genome's gene coordinates). Each interval
    # is minted its OWN feature_idx so it can key a feature table while reads align to
    # its parent. Contract + the closed->half-open coordinate conversion:
    # qiita_compute_orchestrator.jobs.hash_sequences.
    gff_path: {type: string, pattern: "^/"}
    # Index selection (default-ON via the steps' `when:`; omitting a key builds
    # that index). The runner reads these to gate build_rype_index /
    # build_minimap2_index and their register-index siblings.
    build_rype: {type: boolean}
    build_minimap2: {type: boolean}
    # Build params surfaced to the index builders via the steps' `params:`
    # (rype_w -> build_rype_index.w, minimap2_preset -> build_minimap2_index.preset).
    rype_w: {type: integer, minimum: 1}
    minimap2_preset:
      type: string
      enum: [sr, map-ont, map-pb, map-hifi, asm5, asm10, asm20]
  # A host reference must carry at least one index — reject building neither.
  # Fires only when BOTH keys are present and explicitly false (an omitted key
  # defaults ON via the `when:` gate, so the common path is unaffected).
  not:
    required: [build_rype, build_minimap2]
    properties:
      build_rype: {const: false}
      build_minimap2: {const: false}

success_status: active
failure_status: failed

steps:
  # The only new step on the local path: manifest → one combined chunked
  # fasta.parquet, whose `fasta_path` output feeds hash_sequences (identical to
  # host-reference-add's hash_sequences). No target_status: the reference stays
  # `pending` through staging and hash_sequences makes the first transition.
  - step: stage_local_fasta
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.stage_local_fasta
    inputs: [fasta_manifest_path]
    # fasta_path = combined chunked parquet (all files) for hash_sequences. The
    # host-filter index builds consume the feature-keyed chunks the `load` step
    # re-emits, so there is no minimap2-specific subset here.
    outputs: [fasta_path]
    baseline_resources:
      cpu: 4
      mem_gb: 64
      walltime: PT24H

  - step: hash_sequences
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.hash_sequences
    target_status: hashing
    inputs: [fasta_path]
    # Optional GFF3 of annotated intervals. Absent → a ZERO-ROW annotation_manifest
    # rather than an absent output; see the hash_sequences module docstring for why
    # that beats a `when:` gate (short version: `when:` is default-ON).
    optional_inputs: [gff_path]
    outputs: [manifest, reference_sequence_chunks, annotation_manifest]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT24H

  - action: mint-features
    target_status: minting
    inputs: [manifest]
    outputs: [feature_map]

  # Mint a feature_idx for each ANNOTATED INTERVAL, and record the reference's claim
  # on it in qiita.reference_annotation. Deliberately NOT followed by
  # write-membership — membership is what gets INDEXED, and an interval is
  # quantified, not aligned against. `manifest` + `feature_map` are the SEQUENCE
  # side's, read only to resolve each interval's parent_feature_idx.
  # See qiita_control_plane.actions.library.mint_annotation_features.
  - action: mint-annotation-features
    inputs: [annotation_manifest, feature_map]
    outputs: [annotation_map]

  - action: write-membership
    # `manifest` supplies the representative source accession (FASTA-header
    # read_id) per feature_idx; `feature_map` supplies feature_idx. Resolved by
    # binding name in the runner, so order here is not load-bearing.
    inputs: [manifest, feature_map]
    outputs: []

  - step: load
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.reference_load
    target_status: loading
    inputs: [manifest, feature_map, reference_sequence_chunks,
             annotation_manifest, annotation_map]
    optional_inputs: [taxonomy_path, tree_path, jplace_path]
    # `reference_sequence_chunks` is re-emitted feature-keyed here (the
    # hash_sequences binding was sequence_hash-keyed); build_rype_index below
    # consumes that re-keyed form.
    outputs: [staging_dir, reference_sequence_chunks]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT24H

  # MUST precede register-files: register-files MOVES the feature-keyed
  # reference_sequence_chunks part files into permanent DuckLake storage
  # (data-plane move_file), so the index build has to read them from staging
  # first. The persistent .ryxdi is written under the derived-artifact base
  # ({PATH_DERIVED}/references/{reference_idx}/rype/index.ryxdi), not the
  # ephemeral workspace — so it is NOT a step output (the launcher manifest +
  # verifier require every output to resolve under $QIITA_OUTPUT_PATH). The only
  # output is a small in-tree meta JSON (rype_index_meta) carrying index_type /
  # fs_path / params that register-index consumes; fs_path is where the .ryxdi
  # actually lives.
  - step: build_rype_index
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.build_rype_index
    target_status: indexing
    inputs: [reference_sequence_chunks]
    # `rype_w` (action_context) -> build_rype_index.Inputs.w (the rype window).
    params: {rype_w: w}
    # Skipped when action_context sets build_rype: false (rype-only references
    # omit it; minimap2-only references set it false). Its register-index
    # sibling carries the same gate.
    when: build_rype
    outputs: [rype_index_meta]
    # mem_gb 64 (not 32): a large host set (many human genomes) OOMed at 32.
    # An OOM retry doubles this to the 128 GB action_ceiling; the job hard-caps
    # DuckDB at 30 GB and hands the growing remainder to rype's `max_memory`.
    baseline_resources:
      cpu: 8
      mem_gb: 64
      walltime: PT24H

  # Sidecar minimap2 `.mmi` for the second-pass host filter, written to
  # {PATH_DERIVED}/references/{reference_idx}/minimap2/index.mmi. Consumes the
  # SAME feature-keyed `reference_sequence_chunks` as build_rype_index
  # (reassembling whole contigs via string_agg) — no special raw-FASTA subset —
  # so it shares the register-files ordering dependency: it MUST also precede
  # register-files (which MOVES those chunks). Carries `target_status: indexing`
  # too (NOT only build_rype_index): build_rype_index may be skipped
  # (build_rype: false, a minimap2-only reference), so this step must be able to
  # make the `loading → indexing` transition itself. When both build, the second
  # PATCH is an idempotent no-op (runner only PATCHes when the status differs).
  - step: build_minimap2_index
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.build_minimap2_index
    target_status: indexing
    inputs: [reference_sequence_chunks]
    # `minimap2_preset` (action_context) -> build_minimap2_index.Inputs.preset.
    params: {minimap2_preset: preset}
    # Skipped when action_context sets build_minimap2: false (minimap2-only
    # references omit it; rype-only references set it false). Its register-index
    # sibling carries the same gate.
    when: build_minimap2
    # Same as build_rype_index: the persistent .mmi lives under PATH_DERIVED, so
    # the only output is the in-tree meta JSON (fs_path points at the .mmi).
    outputs: [minimap2_index_meta]
    baseline_resources:
      cpu: 4
      mem_gb: 32
      walltime: PT24H

  - action: register-files
    inputs: [staging_dir]
    outputs: []

  # Post-load exclusion sync — identical to host-reference-add's post-register
  # step (a host reference loads taxonomy into the `reference_taxonomy_visible`
  # surface and can carry a genome_map). Unconditional; MUST follow register-files.
  # See reference-add/1.0.0.yaml and actions.library.sync_reference_exclusion.
  - action: sync-reference-exclusion
    inputs: []
    outputs: []

  # One register-index per builder. The runner's register-index arm reads
  # bound[entry.inputs[0]] (native-step outputs are path strings, so the build
  # params ride a meta JSON file), so each step's `inputs` selects which index
  # it records in qiita.reference_index. Each carries the SAME `when:` as its
  # builder so a skipped index also skips its registration (and never reads a
  # never-produced *_index_meta binding).
  - action: register-index
    inputs: [rype_index_meta]
    when: build_rype
    outputs: []

  - action: register-index
    inputs: [minimap2_index_meta]
    when: build_minimap2
    outputs: []

action_ceiling:
  cpu: 16
  # 128 (not 64): build_rype_index now starts at 64 GB and an OOM retry doubles
  # it — the escalator clamps to this ceiling, so it must sit above the baseline
  # for the retry to grow at all (matches host-reference-add's 128 GB ceiling).
  mem_gb: 128
  walltime: PT48H
