action_id: read-mask
version: 1.0.0
target_kind: prep_sample
# Sequenced-only: a mask is over sequencing reads, stored by bcl-convert ingest.
target_processing_kinds: [sequenced]

description: >
  Create one read mask over a prep_sample's already-stored reads. The reads
  are written ONCE by the bcl-convert workflow's `ingest_reads` step (into the
  DuckLake `read` table plus a durable per-sample copy); this workflow never
  parses FASTQ or mints a sequence_idx range. It binds those stored reads as
  `reads` (the runner resolves them from compute_reads_staging_path) and
  records filtering as a `read_mask` — one row per read: survive / trim / why.

  Because reads are stored once and masks are separate, the SAME reads can be
  masked repeatedly against different host references: each submission mints a
  distinct `mask_idx` and writes a side-by-side `read_mask`, all coexisting
  over the one `read` row set. Run it for host reference 2 now and host
  reference 4 later — neither re-runs ingest.

  QC (`qc`) is the same fastp-equivalent transform (adapter trim → optional
  polyG → length/quality filter, fastp `-l 100`), ALWAYS ON, dropping nothing:
  it emits a partial mask (per read: reason + per-end trims) keyed by
  sequence_idx. Listing `adapter_parquet` in its inputs signals the runner to
  materialize the canonical adapter set before the step loop.

  Host filtering (`host_filter`) merges its rype/minimap2 host hits into the QC
  mask under a privacy precedence (host wins over pass; a QC-failed read keeps
  its qc_* reason) and emits the final read_mask, which a register-files step
  loads into the DuckLake `read_mask` table tagged with the CP-minted
  `mask_idx`. The mask_idx is the filtering-config identity the runner mints
  before the loop (the host references the host_filter step actually applies,
  from action_context, plus the resolved QC config), so the same config
  resolves to one mask_idx fleet-wide. host_filter classifies only the QC-pass
  subset (trimmed as the masked view would serve them); when host filtering is
  disabled the mask is the QC mask unchanged.

  host_filter's host indexes are GATED. When action_context sets
  `host_filter_enabled: true`, `host_rype_reference_idx` names an ACTIVE
  reference whose rype (.ryxdi) index is bound (required) and the optional
  `host_minimap2_reference_idx` names a second ACTIVE reference whose minimap2
  (.mmi) index is bound (the runner's _resolve_host_filter_indexes resolves
  them and 400s otherwise). When disabled (or omitted) host_filter's index
  inputs stay unbound and it masks no read as host.

  Per-sample scope (target_kind: prep_sample). The existing one-in-flight-per-
  prep_sample guard serializes concurrent masks of the same sample; a second
  mask against a different reference is submitted once the first ticket is
  terminal.

# persist-read-metrics writes the per-stage read counts onto the sample's
# sequenced_sample (prep_sample subtype) row, so submitters must hold
# prep_sample:write — held by every tier in the audience below (ceilings are
# inclusive), so the admin-only audience does not lose this scope.
scopes:
  - prep_sample:write

# Admin-only: submitting a read mask (host filter / QC reprocessing) makes the
# data plane re-materialize the sample's RAW reads (human-containing) into the
# ticket workspace via the `export_read` DoAction, so this is a privileged
# operation — never a plain `user`. (wet_lab_admin is the lab-operations tier;
# host filtering / QC is a lab operation.)
audience:
  service: false
  human_roles: [wet_lab_admin, system_admin]

context_schema:
  type: object
  # `when:` is DEFAULT-ON — `bool(action_context.get(key, True))` — so an absent
  # gate key RUNS its step. These three are REQUIRED so a ticket that omits one is
  # rejected with a 422 at POST /work-ticket rather than silently executing the
  # long-read lima chain on a short-read sample.
  #
  # NOTE this guards the REST route only: block_planner INSERTs its tickets
  # directly and so bypasses `validate_context`. It writes all three explicitly.
  #
  # (JSON-Schema `default:` is NOT injected — jsonschema never mutates the
  # instance — so a default here would be documentation, not a gate.)
  required: [host_filter_enabled, lima_enabled, syndna_enabled]
  properties:
    # Sequencing instrument model (e.g. "NextSeq 550"), forwarded per sample
    # from qiita.sequencing_run. The qc step gates polyG trimming on a 2-color
    # model (NextSeq/NovaSeq/MiniSeq); absent/unknown → polyG OFF. Passed to qc
    # via the step's `params:` (instrument_model -> qc.Inputs.instrument_model),
    # and folded into the mask identity (different polyG → different mask).
    instrument_model:
      type: string
      minLength: 1
    # Host-filter gate. `host_filter_enabled` defaults off; when true,
    # `host_rype_reference_idx` (REQUIRED) names an ACTIVE reference carrying a
    # rype index, and `host_minimap2_reference_idx` (OPTIONAL) names an ACTIVE
    # reference carrying a minimap2 index — each from its OWN reference.
    # NOTE: plain reference idxs, NOT `*_upload_idx` — the upload-handle walker
    # only touches `_upload_idx` keys, so it leaves these alone.
    host_filter_enabled:
      type: boolean
    host_rype_reference_idx:
      type: integer
      minimum: 1
    host_minimap2_reference_idx:
      type: integer
      minimum: 1
    # Adapter-removal gate (long reads only). `lima_enabled` selects the lima
    # chain; `lima_preset` is the ONLY client-facing lima knob — the control
    # plane resolves the argument string and the vendored adapter set's md5 from
    # it, so a caller cannot forge mask identity or pass arbitrary flags.
    lima_enabled:
      type: boolean
    lima_preset:
      type: string
      enum: [ASYMMETRIC, SYMMETRIC]
    # Spike-in gate. `syndna_enabled`; when true `syndna_reference_idx` (REQUIRED)
    # names an ACTIVE reference carrying a minimap2 (.mmi) index — the same index
    # type the host filter's minimap2 arm uses, so no new builder or index type is
    # needed. The spike-in inserts are the subject sequences; a read aligning to one
    # at high identity is a spike-in.
    syndna_enabled:
      type: boolean
    syndna_reference_idx:
      type: integer
      minimum: 1

steps:
  # ---- SynDNA spike-in marking, gated on `syndna_enabled` -------------------
  #
  # Runs FIRST, on the RAW reads. In case 5 (syndna_is_twisted == False) the
  # spike-ins are added AFTER Twist amplification, so they carry no Twist adaptor.
  # If lima ran first it would drop them as `twist_no_adaptor`, and every later
  # step (including syndna) only re-classifies still-`pass` rows — so the spike-in
  # count would be STRUCTURALLY zero. Marking them here, before lima can touch
  # anything, fixes that. Emits a PARTIAL mask (the 6-column qc_mask shape) under
  # the `partial_mask` binding threaded through the pre-host chain.
  #
  # WARNING: `when:` is DEFAULT-ON — `bool(action_context.get(key, True))`. An
  # action_context that omits `syndna_enabled` RUNS this step. Every producer
  # writes it explicitly, and `context_schema.required` enforces it on the REST
  # route (block_planner INSERTs directly and so bypasses that check).
  - step: syndna
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.syndna
    when: syndna_enabled
    inputs: [reads, syndna_minimap2_path]
    # `alignment` is the alignment the step used to build the mask, emitted verbatim
    # rather than discarded — the old step reduced each read to a boolean and threw the
    # coordinates away, which is exactly what made per-insert quantification impossible.
    # The binding is named generically because align_sharded emits the SAME name, so
    # coverage_depth consumes either without knowing which produced it.
    outputs: [partial_mask, alignment]
    baseline_resources:
      cpu: 4
      mem_gb: 32
      walltime: PT4H

  # ---- Long-read adapter removal (lima), gated on `lima_enabled` -------------
  #
  # Runs before QC: lima needs the intact adaptor, and QC's length filter must
  # judge the INSERT, not the adaptored read. All three entries carry the same
  # `when:` so they skip together (as host-reference-add's builder + its
  # register-index action do).
  #
  # `partial_mask` is the OPTIONAL upstream mask (syndna's, when it ran): the lima
  # chain processes only its still-`pass` reads and carries its non-`pass` rows
  # (the spike-ins) through unchanged — a `spikein_syndna` verdict is never
  # overwritten by `twist_no_adaptor`. When syndna is off, lima runs on all raw
  # reads and produces `partial_mask` itself.
  #
  # Serializing the reads to FASTQ is an on-disk hand-off to a container binary
  # (called out, not silently entrenched). It cannot be streamed:
  # `_resolve_staged_masked_reads` needs an already-completed mask, and this chain
  # is what builds it; the raw `read` table is not Flight-reachable.
  - step: lima_export
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.lima_export
    when: lima_enabled
    inputs: [reads]
    optional_inputs: [partial_mask]
    # `lima_args` is resolved by the control plane from the client's
    # `lima_preset`; it is never client-supplied (it would otherwise let a caller
    # forge mask identity and pass arbitrary flags to a container).
    params: {lima_args: lima_args}
    outputs: [lima_in_fastq, lima_config]
    baseline_resources:
      cpu: 2
      mem_gb: 8
      walltime: PT2H

  # The adapter FASTA is BAKED INTO the image (record order is load-bearing —
  # lima's `--neighbors` keeps only barcode pairs adjacent in the file, and the
  # reference store cannot round-trip an ordered set). `lima_args` reaches the
  # container as a FILE: a container step's `inputs` are bind-mount paths, so a
  # scalar param would be rejected as CONTRACT_VIOLATION.
  - step: lima
    step_type: singleton
    container: lima-2.13.0.sif
    when: lima_enabled
    inputs: [lima_in_fastq, lima_config]
    outputs: [lima_out_fastq]
    baseline_resources:
      cpu: 8
      mem_gb: 16
      walltime: PT4H

  # lima's clipped FASTQ -> a partial read mask, via miint's `infer_trim`. Reads
  # lima dropped become `twist_no_adaptor`; carried spike-ins keep `spikein_syndna`.
  # Overwrites `partial_mask` (self-shadow — _bind_step_inputs reads it before
  # bound.update, so consuming the binding it also produces is safe).
  - step: lima_mask
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.lima_mask
    when: lima_enabled
    inputs: [reads, lima_out_fastq]
    optional_inputs: [partial_mask]
    outputs: [partial_mask]
    baseline_resources:
      cpu: 4
      # infer_trim materializes both sequence sets and substring-searches per row,
      # so this scales with total SEQUENCE BYTES, not row count.
      mem_gb: 32
      walltime: PT4H

  # Always-on QC over the stored reads. Emits a PARTIAL read mask (qc_mask: per
  # read, reason + per-end trims) — it drops nothing. `reads` is runner-bound
  # from the prep_sample's stored reads (_resolve_staged_reads); `adapter_parquet`
  # is materialized by the runner before the loop. `instrument_model` rides
  # through `params:` to gate polyG.
  #
  # `partial_mask` is OPTIONAL: bound when syndna and/or lima ran (last writer
  # wins, so QC sees whichever ran latest). When bound, QC re-classifies only its
  # still-`pass` rows (on the trimmed insert) and carries every non-`pass` row
  # (spike-ins, twist_no_adaptor) through verbatim, emitting trims cumulative from
  # the RAW read. Unbound, QC is the first step and behaves exactly as before.
  - step: qc
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.qc
    inputs: [reads, adapter_parquet]
    optional_inputs: [partial_mask]
    params: {instrument_model: instrument_model}
    outputs: [qc_mask]
    baseline_resources:
      cpu: 4
      mem_gb: 12
      # First-attempt walltime; a TIMEOUT retry escalates it ×2 toward the
      # action_ceiling walltime below (the runner's walltime floor escalation).
      walltime: PT4H

  # Merge host hits into the qc_mask and emit the FINAL read_mask — the sole final
  # emitter (spike-ins/adaptor verdicts are already in qc_mask via the carry chain,
  # so host_filter's `ELSE q.reason` preserves them). Consumes the full `reads`
  # (host classify runs on the trimmed QC-pass subset) and `qc_mask`.
  # `host_rype_path` / `host_minimap2_path` are bound by the runner ONLY when
  # host_filter_enabled (optional_inputs). `mask_idx` is threaded via `params:`
  # — its presence signals the runner to mint the mask before the loop and binds
  # the value into the step. persist-read-metrics / register-files consume its
  # read_mask / read_mask_staging_dir.
  - step: host_filter
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.host_filter
    inputs: [reads, qc_mask]
    optional_inputs: [host_rype_path, host_minimap2_path]
    params: {mask_idx: mask_idx}
    # `read_mask` is the final mask path; `read_mask_staging_dir` is the
    # workspace the register-mask step loads into the DuckLake `read_mask` table.
    outputs: [read_mask, read_mask_staging_dir]
    baseline_resources:
      cpu: 4
      mem_gb: 32
      walltime: PT4H

  # Persist the per-stage read counts onto this prep_sample's 1:1
  # sequenced_sample row, DERIVED from the read_mask (raw / biological /
  # quality-filtered). In-process control-plane action (direct DB write, no
  # backend hop); writing a prep_sample subtype row is why this workflow
  # declares prep_sample:write in `scopes`. MUST run before register-files:
  # register-files MOVES read_mask.parquet out of the staging dir into permanent
  # DuckLake storage, so this read of the staging path must happen first.
  - action: persist-read-metrics
    inputs: [read_mask]
    outputs: []

  # Load the final mask into the DuckLake `read_mask` table. read_mask_staging_dir
  # holds read_mask.parquet, which register-files maps to the `read_mask` table.
  # Moves the parquet out of staging — keep this last (see persist-read-metrics).
  - action: register-files
    inputs: [read_mask_staging_dir]
    outputs: []

  # ---- Per-feature coverage depth, gated on `syndna_enabled` -----------------
  #
  # The quantification the spike-ins exist for: mean coverage depth per annotated
  # interval (per SynDNA insert), keyed by the CP-minted coverage_idx.
  #
  # Runs under the SAME gate as syndna, because it consumes syndna's alignment. It is a
  # separate step, not folded into syndna, so the mechanism stays generic — a genome
  # path feeds the identical job an alignment against a genome reference (windows = that
  # reference's genes) and gets the same feature table out. Folding it into syndna would
  # be the SynDNA-shaped design that has to be rebuilt for genomes.
  #
  # `reference_idx` is the ANNOTATED reference being quantified (the spike-in plasmids).
  # It rides in `params:` rather than as a scope scalar because a read-mask ticket is
  # scoped to a prep_sample, not to a reference.
  - step: coverage_depth
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.coverage_depth
    when: syndna_enabled
    inputs: [alignment]
    # `params:` maps action_context/binding key -> Inputs field.
    params:
      syndna_reference_idx: reference_idx
      coverage_idx: coverage_idx
    outputs: [coverage, coverage_staging_dir]
    baseline_resources:
      cpu: 4
      mem_gb: 16
      walltime: PT2H

  # Idempotent REPLACE. DuckLake has no uniqueness constraint, so re-running this ticket
  # would APPEND a second set of coverage rows under the same coverage_idx — and the
  # duplicate is undetectable: every row is individually well-formed, so a consumer
  # summing or averaging them just reads a silently doubled number. Deletes exactly this
  # (coverage_idx, prep_sample) footprint, so a first run deletes nothing. MUST run
  # immediately before register-files.
  - action: delete-coverage
    when: syndna_enabled
    inputs: []
    outputs: []

  # coverage.parquet -> the DuckLake `coverage` table (basename IS the table name).
  - action: register-files
    when: syndna_enabled
    inputs: [coverage_staging_dir]
    outputs: []

action_ceiling:
  cpu: 8
  mem_gb: 32
  walltime: PT8H
