action_id: reference-add
version: 1.0.0
target_kind: reference

description: >
  Canonicalize and hash DoPut'd reference sequences, mint feature_idx
  values, link them to the reference, re-key sequence data and lift
  optional taxonomy / tree / placements into DuckLake-shape staging
  files, then register the staging files in DuckLake.

scopes:
  - reference:write

audience:
  service: false
  human_roles: [wet_lab_admin, system_admin]

context_schema:
  type: object
  required: [fasta_upload_idx]
  properties:
    # Required: DoPut handle for the canonical (read_id, sequence)
    # upload that hash_sequences consumes. The runner resolves
    # `*_upload_idx` keys to filesystem paths under matching `*_path`
    # bindings before any step runs (see
    # qiita_control_plane.runner._resolve_upload_handles).
    fasta_upload_idx: {type: integer, minimum: 1}
    # Optional DoPut handles for the supplementary reference inputs.
    # Absent uploads → absent staging files → the corresponding
    # DuckLake tables receive no rows from this run.
    #
    # taxonomy / tree / jplace flow into the `load` step's
    # optional_inputs and are consumed there. genome_map_upload_idx is
    # the odd one out: the `mint-features` action below pulls it
    # directly via `bound.get("genome_map_path")` in runner.py — it is
    # NOT wired through `load`. A YAML-only reader can't tell that from
    # `mint-features`'s `inputs: [manifest]` line, so this is the only
    # place the genome_map data flow is visible.
    taxonomy_upload_idx: {type: integer, minimum: 1}
    tree_upload_idx: {type: integer, minimum: 1}
    jplace_upload_idx: {type: integer, minimum: 1}
    genome_map_upload_idx: {type: integer, minimum: 1}
    # Analysis sharding (opt-in, default OFF). When true, after register-files the
    # `plan-shards` action assigns this reference's genome-bearing features to N
    # lineage-sorted shards (reference_membership.shard_id) and fans out one
    # build-shard-index ticket per shard; the reference goes loading → indexing →
    # (all shards registered) → active, so `active` guarantees complete sharded
    # indexes. Sharding is an indexing choice ON the same reference data — not a
    # separate action. Taxonomy SHOULD be supplied (sharding sorts by lineage);
    # an all-unclassified reference still shards (lineage=''). Default OFF →
    # today's loading → active, no build, byte-identical.
    shard_index: {type: boolean}
    # Which per-shard analysis indexes to build (default-ON via the
    # build-shard-index steps' `when:`; only meaningful when shard_index is true).
    build_rype: {type: boolean}
    build_minimap2: {type: boolean}
    build_bowtie2: {type: boolean}
    # Build params forwarded to the shard builders (rype_w -> build_rype_index.w,
    # minimap2_preset -> build_minimap2_index.preset).
    rype_w: {type: integer, minimum: 1}
    minimap2_preset:
      type: string
      enum: [sr, map-ont, map-pb, map-hifi, asm5, asm10, asm20]
  # A sharded reference must build at least one index type — reject sharding with
  # every builder disabled. Fires only when shard_index is true AND all three
  # build_* are explicitly false (an omitted build_* defaults ON via `when:`, so
  # the common sharded path is unaffected).
  not:
    required: [shard_index, build_rype, build_minimap2, build_bowtie2]
    properties:
      shard_index: {const: true}
      build_rype: {const: false}
      build_minimap2: {const: false}
      build_bowtie2: {const: false}

success_status: active
failure_status: failed

steps:
  - step: hash_sequences
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.hash_sequences
    target_status: hashing
    inputs: [fasta_path]
    outputs: [manifest, reference_sequence_chunks]
    baseline_resources:
      cpu: 4
      mem_gb: 8
      walltime: PT1H

  - action: mint-features
    target_status: minting
    inputs: [manifest]
    outputs: [feature_map]

  - action: write-membership
    inputs: [feature_map]
    outputs: []

  - step: load
    step_type: singleton
    module: qiita_compute_orchestrator.jobs.reference_load
    target_status: loading
    inputs: [manifest, feature_map, reference_sequence_chunks]
    optional_inputs: [taxonomy_path, tree_path, jplace_path]
    outputs: [staging_dir]
    baseline_resources:
      cpu: 8
      mem_gb: 32
      walltime: PT2H

  - action: register-files
    inputs: [staging_dir]
    outputs: []

  # Sharded-index fan-out (opt-in). Runs ONLY when action_context sets
  # shard_index: true. MUST follow register-files — a shard build streams its
  # chunks from DuckLake, and register-files is what MOVES the staging chunks in.
  # plan-shards assigns reference_membership.shard_id, transitions
  # loading → indexing, and fans out one build-shard-index ticket per shard
  # (N = 0 for a reference with no genomes is a no-op). The action keeps
  # success_status: active for the unsharded path; the runner's finalize skips
  # that patch while a sharded fan-out is in progress (the reference is
  # `indexing`), leaving `indexing → active` to each shard's terminal
  # finalize-shard. No inputs/outputs: reference_idx is the scope target.
  - action: plan-shards
    when: shard_index
    inputs: []
    outputs: []

action_ceiling:
  cpu: 16
  mem_gb: 128
  walltime: PT4H
