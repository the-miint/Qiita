name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: make lint-python

  lint-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Defensive: lint needs both. dtolnay defaults already include
          # them, but pinning the request makes the intent explicit so a
          # future default change can't silently drop one.
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qiita-data-plane
          prefix-key: "v1"  # bump to invalidate stale bundled-feature cache
          # macOS preinstalls a `cargo` shim that is actually rustup-init,
          # and ~/.cargo/bin/ isn't first on PATH. Caching that directory
          # can shadow the toolchain dtolnay just installed and break
          # `cargo clippy` on cache restore. Disable bin caching here.
          cache-bin: false
      - uses: ./.github/actions/setup-libduckdb
      - run: make lint-rust

  test-python:
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: make test-python

  test-control-plane-with-db:
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Provision host Postgres (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@17
          echo "$(brew --prefix postgresql@17)/bin" >> "$GITHUB_PATH"
          export PATH="$(brew --prefix postgresql@17)/bin:$PATH"
          brew services start postgresql@17
          for i in {1..30}; do pg_isready -h localhost -p 5432 && break; sleep 1; done
          psql -d postgres -c "CREATE USER qiita WITH SUPERUSER PASSWORD 'qiita';"
          psql -d postgres -c "CREATE DATABASE qiita_test OWNER qiita;"
      - name: Configure host-postgres env (macOS)
        if: runner.os == 'macOS'
        run: |
          {
            echo "QIITA_USE_HOST_POSTGRES=1"
            echo "QIITA_TEST_POSTGRES_URL=postgresql://qiita:qiita@localhost:5432/qiita_test?sslmode=disable"
            echo "PGHOST=localhost"
            echo "PGPORT=5432"
            echo "PGUSER=qiita"
            echo "PGPASSWORD=qiita"
          } >> "$GITHUB_ENV"
      - run: make test-control-plane-with-db

  test-rust:
    needs: lint-rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qiita-data-plane
          prefix-key: "v1"  # bump to invalidate stale bundled-feature cache
          cache-bin: false  # see lint-rust for rationale
      - uses: ./.github/actions/setup-libduckdb
        with:
          runtime-libpath: "true"
          cache-extensions: "true"
      - run: make test-rust

  test-integration:
    needs: [test-python, test-rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Provision host Postgres (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@17
          echo "$(brew --prefix postgresql@17)/bin" >> "$GITHUB_PATH"
          export PATH="$(brew --prefix postgresql@17)/bin:$PATH"
          brew services start postgresql@17
          for i in {1..30}; do pg_isready -h localhost -p 5432 && break; sleep 1; done
          psql -d postgres -c "CREATE USER qiita WITH SUPERUSER PASSWORD 'qiita';"
          psql -d postgres -c "CREATE DATABASE qiita_test OWNER qiita;"
          psql -d postgres -c "CREATE DATABASE qiita_ducklake OWNER qiita;"
      - name: Configure host-postgres env (macOS)
        if: runner.os == 'macOS'
        run: |
          {
            echo "QIITA_USE_HOST_POSTGRES=1"
            echo "QIITA_TEST_POSTGRES_URL=postgresql://qiita:qiita@localhost:5432/qiita_test?sslmode=disable"
            echo "DUCKLAKE_CATALOG_CONNSTR=dbname=qiita_ducklake host=localhost port=5432 user=qiita password=qiita sslmode=disable"
            echo "PGHOST=localhost"
            echo "PGPORT=5432"
            echo "PGUSER=qiita"
            echo "PGPASSWORD=qiita"
          } >> "$GITHUB_ENV"
      - run: make test-integration

  test-workflows:
    needs: [lint-python, lint-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: ~/.apptainer/cache
          key: apptainer-${{ runner.os }}-ubuntu-24.04
      - name: Install Apptainer
        run: |
          APPTAINER_VERSION=1.4.5
          sudo apt-get install -y fuse2fs uidmap
          wget -q https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb
          sudo dpkg -i apptainer_${APPTAINER_VERSION}_amd64.deb
          rm apptainer_${APPTAINER_VERSION}_amd64.deb
      - run: make test-workflows
