name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: make lint-python

  lint-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qiita-data-plane
          prefix-key: "v1"  # bump to invalidate stale bundled-feature cache
      - name: Cache libduckdb
        id: cache-libduckdb
        uses: actions/cache@v5
        with:
          path: ~/.duckdb/lib
          key: libduckdb-${{ runner.os }}-v1.5.2
      - name: Download libduckdb
        if: steps.cache-libduckdb.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.duckdb/lib
          if [ "$RUNNER_OS" = "macOS" ]; then
            curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.5.2/libduckdb-osx-universal.zip -o /tmp/libduckdb.zip
          else
            curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.5.2/libduckdb-linux-amd64.zip -o /tmp/libduckdb.zip
          fi
          unzip -j /tmp/libduckdb.zip -d ~/.duckdb/lib
      - name: Set DUCKDB env vars
        run: echo "DUCKDB_LIB_DIR=$HOME/.duckdb/lib" >> $GITHUB_ENV
      - run: make lint-rust

  test-python:
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: make test-python

  test-rust:
    needs: lint-rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qiita-data-plane
          prefix-key: "v1"  # bump to invalidate stale bundled-feature cache
      - name: Cache libduckdb
        id: cache-libduckdb
        uses: actions/cache@v5
        with:
          path: ~/.duckdb/lib
          key: libduckdb-${{ runner.os }}-v1.5.2
      - name: Download libduckdb
        if: steps.cache-libduckdb.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.duckdb/lib
          if [ "$RUNNER_OS" = "macOS" ]; then
            curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.5.2/libduckdb-osx-universal.zip -o /tmp/libduckdb.zip
          else
            curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.5.2/libduckdb-linux-amd64.zip -o /tmp/libduckdb.zip
          fi
          unzip -j /tmp/libduckdb.zip -d ~/.duckdb/lib
      - uses: actions/cache@v5
        with:
          path: ~/.duckdb/extensions
          key: duckdb-ext-${{ runner.os }}-v1.5.2
      - name: Set DUCKDB env vars
        run: |
          echo "DUCKDB_LIB_DIR=$HOME/.duckdb/lib" >> $GITHUB_ENV
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "DYLD_LIBRARY_PATH=$HOME/.duckdb/lib" >> $GITHUB_ENV
          else
            echo "LD_LIBRARY_PATH=$HOME/.duckdb/lib" >> $GITHUB_ENV
          fi
      - run: make test-rust

  test-integration:
    needs: [test-python, test-rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Provision host Postgres (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@16
          echo "$(brew --prefix postgresql@16)/bin" >> "$GITHUB_PATH"
          export PATH="$(brew --prefix postgresql@16)/bin:$PATH"
          brew services start postgresql@16
          for i in {1..30}; do pg_isready -h localhost -p 5432 && break; sleep 1; done
          psql -d postgres -c "CREATE USER qiita WITH SUPERUSER PASSWORD 'qiita';"
          psql -d postgres -c "CREATE DATABASE qiita_test OWNER qiita;"
          psql -d postgres -c "CREATE DATABASE qiita_ducklake OWNER qiita;"
      - name: Configure host-postgres env (macOS)
        if: runner.os == 'macOS'
        run: |
          {
            echo "QIITA_USE_HOST_POSTGRES=1"
            echo "QIITA_TEST_POSTGRES_URL=postgresql://qiita:qiita@localhost:5432/qiita_test"
            echo "DUCKLAKE_CATALOG_CONNSTR=dbname=qiita_ducklake host=localhost port=5432 user=qiita password=qiita"
            echo "PGHOST=localhost"
            echo "PGPORT=5432"
            echo "PGUSER=qiita"
            echo "PGPASSWORD=qiita"
          } >> "$GITHUB_ENV"
      - run: make test-integration

  test-workflows:
    needs: [lint-python, lint-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: ~/.apptainer/cache
          key: apptainer-${{ runner.os }}-ubuntu-24.04
      - name: Install Apptainer
        run: |
          APPTAINER_VERSION=1.4.5
          sudo apt-get install -y fuse2fs uidmap
          wget -q https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb
          sudo dpkg -i apptainer_${APPTAINER_VERSION}_amd64.deb
          rm apptainer_${APPTAINER_VERSION}_amd64.deb
      - run: make test-workflows
