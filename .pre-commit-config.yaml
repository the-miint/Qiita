repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Files kept BYTE-FOR-BYTE as vendored from upstream, exempt from these
      # three hooks:
      #
      #  - Swagger UI / ReDoc docs assets (see docs/api-docs.md). Minified, so a
      #    whitespace fixer would corrupt them, and large by nature (the 500 KB
      #    cap catches accidental blobs, not deliberate bundles).
      #    landing.css / landing.js in the same dir are NOT exempt.
      #  - The Twist adapter FASTA the lima image bakes in. Its md5 is pinned
      #    into the read-mask identity hash (`_LIMA_ADAPTER_SET_MD5`), and
      #    end-of-file-fixer WOULD append the trailing newline PacBio's published
      #    file lacks — silently changing the md5 and breaking the pin. Keeping it
      #    byte-exact also lets anyone verify it against the upstream artifact.
      - id: trailing-whitespace
        exclude: &vendored_verbatim ^(qiita-control-plane/src/qiita_control_plane/static/(swagger-ui-bundle\.js|swagger-ui\.css|redoc\.standalone\.js)|workflows/read-mask/twist_adapters_231010\.fasta)$
      - id: end-of-file-fixer
        exclude: *vendored_verbatim
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: *vendored_verbatim

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --manifest-path qiita-data-plane/Cargo.toml
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --manifest-path qiita-data-plane/Cargo.toml -- -D warnings
        types: [rust]
        pass_filenames: false
