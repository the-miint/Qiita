services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qiita
      POSTGRES_PASSWORD: qiita
      POSTGRES_DB: qiita_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiita"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
