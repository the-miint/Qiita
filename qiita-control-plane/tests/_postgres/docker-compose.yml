services:
  postgres:
    image: postgres:17
    # Durability off: this is an ephemeral CI/test cluster, so fsync and WAL
    # full-page writes buy nothing but per-commit disk-sync latency — which
    # serializes the write-heavy DB suite across xdist workers on one instance.
    # Safe to lose on crash; the cluster is thrown away after the run.
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    environment:
      POSTGRES_USER: qiita
      POSTGRES_PASSWORD: qiita
      POSTGRES_DB: qiita_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiita"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
