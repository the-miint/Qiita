# Qiita nginx configuration
# REST → qiita-control-plane
# gRPC (HTTP/2) → qiita-data-plane (load-balanced across N instances)

upstream qiita_control_plane {
    server 127.0.0.1:8080;
}

# Add instances here as the data plane scales horizontally
upstream qiita_data_plane {
    server 127.0.0.1:50051;
    # server 127.0.0.1:50052;
    # server 127.0.0.1:50053;
}

# Rate-limit zone for the anonymous-readable endpoint
# (GET /api/v1/reference/{reference_idx}). Authenticated routes are not
# rate-limited at this layer.
limit_req_zone $binary_remote_addr zone=qiita_public:10m rate=5r/s;

# Per-client connection cap for the Arrow Flight edge (below). Flight is
# authenticated by HMAC-signed ticket, so a per-request rate limit would
# throttle legitimate bulk transfers; bound concurrent connections per client
# instead to blunt connection floods on the publicly-reachable data plane.
limit_conn_zone $binary_remote_addr zone=qiita_flight_conn:10m;

server {
    listen 443 ssl;
    http2 on;
    # __QIITA_HOSTNAME__ is substituted at deploy time by deploy/activate.sh
    # using the QIITA_HOSTNAME env var (e.g. qiita-miint.ucsd.edu).
    server_name __QIITA_HOSTNAME__;

    ssl_certificate     /etc/ssl/certs/qiita.crt;
    ssl_certificate_key /etc/ssl/private/qiita.key;

    # Anonymous-readable endpoint: GET /api/v1/reference/{reference_idx}
    # accepts unauthenticated callers by design. Rate-limit it on
    # $binary_remote_addr to bound bulk-scrape blast radius. Authenticated
    # routes (matched by the catch-all below) are not rate-limited at this
    # layer. Path is singular per the naming convention (CLAUDE.md);
    # reference_idx is a positive integer (qiita_common/api_paths.py).
    location ~ ^/api/v1/reference/[0-9]+$ {
        limit_req zone=qiita_public burst=20 nodelay;
        proxy_pass http://qiita_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # REST → control plane
    location / {
        proxy_pass http://qiita_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # gRPC → data plane (Arrow Flight)
    location /arrow.flight.protocol.FlightService/ {
        grpc_pass grpc://qiita_data_plane;

        # A DoPut is one client-streaming RPC: reference_load.py opens a single
        # do_put and streams every batch of a reference through it, so nginx
        # sees the whole (multi-GiB) upload as one request body. client_max_body_size
        # caps that whole body, not a single message — so any finite value caps
        # the entire reference and a large one would 413 here even though every
        # gRPC message stays well under the data plane's own per-message decode
        # ceiling (FLIGHT_MAX_DECODING_BYTES, 1 GiB). The two limits measure
        # different things; matching the per-message ceiling here was a category
        # error. Disable the whole-body cap and let the real bounds hold: the
        # DP's per-message decode ceiling, limit_conn below, and HMAC ticket auth
        # (the DP rejects any request whose ticket isn't validly signed).
        client_max_body_size 0;

        # Large DoGet exports / DoPut uploads stream well past the 60s default
        # idle timeout — a big sample's first batch can take longer than that to
        # materialize. Give the stream room in both directions.
        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;

        # Bound concurrent Flight connections per client (see zone above). This
        # counts HTTP/2 *connections*, not streams: a Flight client multiplexes
        # many RPCs as streams over a single connection, so 64 blunts connection
        # floods (the DoS vector on this public edge) rather than per-connection
        # RPC concurrency — a legitimate bulk client needs only one connection.
        limit_conn qiita_flight_conn 64;
    }

    # gRPC health check
    location /grpc.health.v1.Health/ {
        grpc_pass grpc://qiita_data_plane;
    }
}
